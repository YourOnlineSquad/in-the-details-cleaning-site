<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "In The Details Cleaning Services | Home Cleaning in Santa Cruz County" }}</title>
    <meta name="description" content="{{ page.description | default: 'Non toxic house cleaning in San Lorenzo Valley and Santa Cruz County with compassionate, detail focused support.' }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/style.css">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CleaningService",
      "name": "In The Details Cleaning Services",
      "url": "https://www.inthedetailscleaningservices.com/",
      "telephone": "831-889-2566",
      "email": "kelly@inthedetailscleaningservices.com",
      "areaServed": ["San Lorenzo Valley", "Santa Cruz County", "Ben Lomond", "Felton", "Boulder Creek", "Scotts Valley", "Santa Cruz"],
      "serviceType": ["Basic Maintenance Cleaning","Deep Cleaning","Move In and Move Out Cleaning","Post Construction Cleaning","Vacation Rental Turnover Cleaning","Hoarding Support Cleaning","Home Organization","Cleaning Add Ons"]
    }
    </script>

    {% if page.faq_schema %}
    {{ page.faq_schema }}
    {% endif %}
</head>
<body>
    {% include header.html %}

    <main class="site-main">
        {{ content }}
    </main>

    {% include footer.html %}

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const menuToggle = document.querySelector('.menu-toggle');
            const navLinks = document.querySelector('.nav-links');
            if (menuToggle) {
                menuToggle.addEventListener('click', () => {
                    navLinks.classList.toggle('active');
                });
            }
        });
    </script>
</body>
</html>
