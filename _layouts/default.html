<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "Empire Air Ducts & Vent Cleaning" }}</title>
    <meta name="description" content="{{ page.description | default: 'Premium air duct, dryer vent, and commercial hood cleaning services.' }}">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/empire-air-ducts-cleaning/style.css">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Empire Air Ducts Cleaning",
      "image": "https://via.placeholder.com/800x600.png?text=Empire+Air+Ducts",
      "@id": "",
      "url": "https://yourwebsite.com",
      "telephone": "951-481-2118",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Murrieta",
        "addressRegion": "CA",
        "addressCountry": "US"
      },
      "areaServed": ["Murrieta", "Temecula", "Riverside County", "Orange County", "San Bernardino County"],
      "priceRange": "$$"
    }
    </script>
    
    {% if page.faq_schema %}
    {{ page.faq_schema }}
    {% endif %}
</head>
<body>
    {% include header.html %}
    
    <main class="site-main">
        {{ content }}
    </main>

    {% include footer.html %}
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Main mobile menu toggle
            const menuToggle = document.querySelector('.menu-toggle');
            const navLinks = document.querySelector('.nav-links');
            if(menuToggle) {
                menuToggle.addEventListener('click', () => {
                    navLinks.classList.toggle('active');
                });
            }

            // Mobile Dropdown toggles
            const dropdowns = document.querySelectorAll('.has-dropdown');
            dropdowns.forEach(dropdown => {
                dropdown.addEventListener('click', (e) => {
                    // Only trigger click logic on mobile view
                    if (window.innerWidth <= 768) {
                        // Prevent the link from firing if we just want to open the menu
                        if(e.target.classList.contains('nav-link') || e.target.classList.contains('chevron')) {
                            e.preventDefault();
                            // Close other dropdowns
                            dropdowns.forEach(d => { if(d !== dropdown) d.classList.remove('active'); });
                            dropdown.classList.toggle('active');
                        }
                    }
                });
            });
        });
    </script>
</body>
</html>
